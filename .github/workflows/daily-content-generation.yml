# .github/workflows/daily-content-generation.yml
name: Daily Content Generation

on:
  schedule:
    # Run at 00:30 UTC daily (generate content for tomorrow)
    - cron: '30 0 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  generate-content:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Generate Chinese Horoscopes
      env:
        VITE_SANITY_PROJECT_ID: ${{ secrets.VITE_SANITY_PROJECT_ID }}
        VITE_SANITY_DATASET: ${{ secrets.VITE_SANITY_DATASET }}
        SANITY_API_WRITE_TOKEN: ${{ secrets.SANITY_API_WRITE_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node sync-chinese-horoscopes-sanity.js
      
    - name: Wait between jobs (rate limiting)
      run: sleep 30
      
    - name: Generate Western Horoscopes
      env:
        VITE_SANITY_PROJECT_ID: ${{ secrets.VITE_SANITY_PROJECT_ID }}
        VITE_SANITY_DATASET: ${{ secrets.VITE_SANITY_DATASET }}
        SANITY_API_WRITE_TOKEN: ${{ secrets.SANITY_API_WRITE_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node sync-western-horoscopes-sanity.js
      
    - name: Wait between jobs (rate limiting)
      run: sleep 15
      
    - name: Generate Daily Wisdom
      env:
        VITE_SANITY_PROJECT_ID: ${{ secrets.VITE_SANITY_PROJECT_ID }}
        VITE_SANITY_DATASET: ${{ secrets.VITE_SANITY_DATASET }}
        SANITY_API_WRITE_TOKEN: ${{ secrets.SANITY_API_WRITE_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node sync-daily-wisdom.js
      
    - name: Wait between jobs (rate limiting)
      run: sleep 15
      
    - name: Generate Feng Shui Tip
      env:
        VITE_SANITY_PROJECT_ID: ${{ secrets.VITE_SANITY_PROJECT_ID }}
        VITE_SANITY_DATASET: ${{ secrets.VITE_SANITY_DATASET }}
        SANITY_API_WRITE_TOKEN: ${{ secrets.SANITY_API_WRITE_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node sync-daily-fengshui-tip.js
      
    - name: Wait between jobs (rate limiting)
      run: sleep 15
      
    - name: Generate Planetary Overview
      env:
        VITE_SANITY_PROJECT_ID: ${{ secrets.VITE_SANITY_PROJECT_ID }}
        VITE_SANITY_DATASET: ${{ secrets.VITE_SANITY_DATASET }}
        SANITY_API_WRITE_TOKEN: ${{ secrets.SANITY_API_WRITE_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node sync-daily-planetary-overview.js
      
    - name: Workflow completion
      run: |
        echo "✅ Daily content generation completed successfully!"
        echo "Generated content for tomorrow: $(date -d '+1 day' '+%Y-%m-%d')"